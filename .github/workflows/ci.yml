name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Read the Go version from the go directive in go.mod so CI never
          # drifts from the module (a dependency bumped this to 1.25).
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race)
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        # v8 installs golangci-lint v2 (built with a current Go); v6 pinned a v1
        # built with Go 1.24, which refuses to run against this go 1.25 module.
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          args: --timeout=5m
