name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

# Least privilege by default; only the release job needs write (to publish).
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME:-dev}" >> "$GITHUB_OUTPUT"

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          # Windows is intentionally excluded: the audit/native-ssh code uses
          # syscall.Flock, which is unix-only.
          stage="agentssh_${VERSION}_${GOOS}_${GOARCH}"
          mkdir -p "dist/${stage}"
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/${stage}/agentssh" ./cmd/agentssh
          cp LICENSE README.md "dist/${stage}/"
          tar -C dist -czf "dist/${stage}.tar.gz" "${stage}"
          ( cd dist && sha256sum "${stage}.tar.gz" > "${stage}.tar.gz.sha256" )
          rm -rf "dist/${stage}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentssh_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Combine checksums
        run: ( cd dist && cat *.tar.gz.sha256 > SHA256SUMS.txt )

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
          generate_release_notes: true
